spring.application.name=hermes
server.port=8080

# Never leak stack traces or internal messages to API consumers
server.error.include-message=never
server.error.include-stacktrace=never

# Actuator: expose only health and info
management.endpoints.web.exposure.include=health,info

spring.jackson.default-property-inclusion=non_null

# Path to the landscape definition loaded at startup.
# Override with an external file, e.g. -Dhermes.landscape.path=file:./my-landscape.json
hermes.landscape.path=classpath:landscape.json

# Optional API key protection. When set, every request (except actuator health)
# must carry the X-API-Key header. Leave empty to run the API open for local demos.
hermes.security.api-key=
